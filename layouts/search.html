{{ define "main" }}
  <article class="pa3 pa4-ns">
    <h1 class="f3 f2-ns mb4">搜索菜谱</h1>
    
    <div class="mb4">
      <input 
        type="text" 
        id="search-input" 
        placeholder="输入菜谱名称进行搜索..." 
        class="input-reset ba b--black-20 pa2 w-100 w-50-ns"
        autocomplete="off"
      />
    </div>
    
    <div id="search-results" class="flex-ns flex-wrap mx-n2">
      {{ range .Site.RegularPages }}
        <div class="w-50-ns w-100 pa2 search-item" data-title="{{ .Title | plainify | lower }}" data-link="{{ .Permalink }}">
          <a href="{{ .Permalink }}" class="no-underline pa2 ba b--black-10 br2 db hover-shadow">
            <h3 class="f4 mb2 mt0">{{ .Title }}</h3>
            {{ with .Params.description }}
              <p class="gray f6 mt0 mb2">{{ . }}</p>
            {{ end }}
            {{ with .Params.tags }}
              <div class="flex flex-wrap">
                {{ range first 3 . }}
                  <span class="f6 bg-gray-100 pa1 mr1 br1">{{ . }}</span>
                {{ end }}
              </div>
            {{ end }}
          </a>
        </div>
      {{ end }}
    </div>
    
    <div id="no-results" class="dn pa4 tc gray">
      未找到匹配的菜谱
    </div>
  </article>
  
  <script>
    (function() {
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      const noResults = document.getElementById('no-results');
      const items = document.querySelectorAll('.search-item');
      
      searchInput.addEventListener('input', function(e) {
        const query = e.target.value.trim().toLowerCase();
        let visibleCount = 0;
        
        items.forEach(function(item) {
          const title = item.getAttribute('data-title');
          const link = item.getAttribute('data-link');
          
          if (query === '' || title.includes(query)) {
            item.classList.remove('dn');
            visibleCount++;
          } else {
            item.classList.add('dn');
          }
        });
        
        if (visibleCount === 0 && query !== '') {
          searchResults.classList.add('dn');
          noResults.classList.remove('dn');
        } else {
          searchResults.classList.remove('dn');
          noResults.classList.add('dn');
        }
      });
      
      // 自动聚焦搜索框
      searchInput.focus();
    })();
  </script>
{{ end }}
